name: Sites Update

on:
  workflow_dispatch:

jobs:
  update-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Parse sites one by one
      - name: Parse content.astro.com.my
        run: |
          npm run channels:parse -- --config=./sites/content.astro.com.my/content.astro.com.my.config.js --output=./sites/content.astro.com.my/content.astro.com.my.channels.xml

      - name: Parse distro.tv
        run: |
          npm run channels:parse -- --config=./sites/distro.tv/distro.tv.config.js --output=./sites/distro.tv/distro.tv.channels.xml

      - name: Parse epgshare01.online-IN1
        run: |
          npm run channels:parse -- --config=./sites/epgshare01.online/epgshare01.online.config.js --output=./sites/epgshare01.online/epgshare01.online_IN1.channels.xml --set=tag:IN1

      - name: Parse epgshare01.online-IN4
        run: |
          npm run channels:parse -- --config=./sites/epgshare01.online/epgshare01.online.config.js --output=./sites/epgshare01.online/epgshare01.online_IN4.channels.xml --set=tag:IN4

      - name: Parse i.mjh.nz-samsung
        run: |
          npm run channels:parse -- --config=./sites/i.mjh.nz/i.mjh.nz.config.js --output=./sites/i.mjh.nz/i.mjh.nz_samsung.channels.xml --set=provider:samsung

      - name: Parse jiotv.com
        run: |
          npm run channels:parse -- --config=./sites/jiotv.com/jiotv.com.config.js --output=./sites/jiotv.com/jiotv.com.channels.xml --set=tag:jio

      - name: Parse sky.com
        run: |
          npm run channels:parse -- --config=./sites/sky.com/sky.com.config.js --output=./sites/sky.com/sky.com.channels.xml

      - name: Parse tataplay.com
        run: |
          npm run channels:parse -- --config=./sites/tataplay.com/tataplay.com.config.js --output=./sites/tataplay.com/tataplay.com.channels.xml

      - name: Parse visionplus.id-en
        run: |
          npm run channels:parse -- --config=./sites/visionplus.id/visionplus.id.config.js --output=./sites/visionplus.id/visionplus.id_en.channels.xml --set=lang:en

      # Commit changes after all sites processed
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./sites/**/*.channels.xml
          git commit -m "Update channels for all successful sites [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed (check permissions)"
