name: Tempest EPG Grabber

on:
  schedule:
    - cron: '45 22 * * *' # Runs at 4:15 AM IST
  workflow_dispatch:

jobs:
  grab-epg:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata   # ✅ Force IST timezone for all steps

    steps:
    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: xml, imagick, zip, curl

    # Step 3: Unzip epg-grabber into temp directory
    - name: Unzip epg-grabber
      run: |
        mkdir -p temp_epg
        unzip -o epg-grabber.zip -d temp_epg

    # Step 4: Run Tempest script (PHP uses IST now)
    - name: Run Tempest script
      run: php temp_epg/tempest.php --epg config=tempest.config.xml

    # Step 5: Run Tempest EPG Python generator (uses IST too)
    - name: Run tempest EPG Python script
      run: python3 scripts/tempest_epg.py

    # Step 6: Remove raw XML file
    - name: Cleanup raw XML
      run: rm -f temp_epg/tempest_config/epg/epg.xml

    # Step 7: Repack epg-grabber.zip
    - name: Repack epg-grabber
      run: |
        rm -f epg-grabber.zip
        cd temp_epg
        zip -r ../epg-grabber.zip .
        cd ..

    # Step 8: Remove temporary folder
    - name: Remove temporary folder
      run: rm -rf temp_epg

    # Step 9: Get current date (IST)
    - name: Get current date in IST
      id: get_date
      run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    # Step 10: Commit and push updated files
    - name: Commit and push updated files
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "EPG grabbed at ${{ env.current_date }} (IST)"
