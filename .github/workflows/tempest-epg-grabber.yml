name: Tempest EPG Grabber

on:
  schedule:
    - cron: '45 22 * * *' # Runs at 4:15 AM IST
  workflow_dispatch: # Manual trigger

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: xml, imagick, zip, curl

    # Step 3: Run Tempest script
    - name: Run Tempest script
      run: php epg-grabber/tempest.php --epg config=tempest.config.xml

    # Step 4: Run Tempest EPG Python generator (creates epg.xml.gz)
    - name: Run tempest EPG Python script
      run: python3 scripts/tempest_epg.py

    # Step 5: Remove intermediate XML file
    - name: Remove raw EPG XML
      run: rm -f epg-grabber/tempest_config/epg/epg.xml

    # Step 6: Get current date in IST
    - name: Get current date in IST
      id: get_date
      env:
        TZ: Asia/Kolkata
      run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    # Step 7: Commit and push updated files
    - name: Commit and push updated files
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "EPG grabbed at ${{ env.current_date }} (IST)"
