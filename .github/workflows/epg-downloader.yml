name: EPG Downloader

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"  # 3:30 AM IST

jobs:
  epg-downloader:
    name: EPG Download & Organize
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Node.js Setup ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node.js dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      # --- Grab EPG ---
      - name: Grab EPG
        run: |
          mkdir -p guide
          OUTFILE=guide/guide.xml
          CHANNELS=sites/guide.xml

          echo "Grabbing EPG..."
          if npm run grab -- --channels="$CHANNELS" --maxConnections=10 --days=3 --output="$OUTFILE"; then
            echo "Grab successful: $OUTFILE"
          else
            [ -f "$CHANNELS" ] && cp "$CHANNELS" "$OUTFILE"
          fi

      # --- Python Setup ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          else
            pip install --no-cache-dir requests

      # --- Run EPG Organizer Script ---
      - name: Clean & Organize EPG
        run: |
          if [ -f scripts/personal/epg-grabber.py ]; then
            python3 scripts/personal/epg-grabber.py "guide/guide.xml"
          fi
          if [ -f scripts/personal/epg-downloader.py ]; then
            python3 scripts/personal/epg-downloader.py
          fi

      # --- Commit & push final EPG ---
      - name: Commit & Push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          git add guide/*.xml.gz || true
          git diff --cached --quiet || git commit -m "📺 Automatically downloaded EPG"
          git pull --rebase --autostash || true
          git push || true
