name: EPG Grabber

on:
  schedule:
    - cron: "30 20 * * *" # Daily at 02:00 IST (20:30 UTC)
  workflow_dispatch:

jobs:
  dishtv:
    name: Dish TV Grabber
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone EPG repo
        run: git clone --depth 1 -b master https://github.com/iptv-org/epg.git epg-org

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: epg-org/package-lock.json

      - name: Install dependencies
        run: cd epg-org && npm install --no-audit --no-fund --legacy-peer-deps

      - name: Run grabber (DishTV)
        run: |
          cd epg-org
          npm run grab -- --channels=../sites/dishtv.xml --maxConnections=10 --days=3 --gzip
          mkdir -p ../epg
          cp guide.xml ../epg/dishtv.xml
          cp guide.xml.gz ../epg/dishtv.xml.gz

      - name: Clean EPG file
        run: python3 scripts/dishtv_epg.py

      - name: Commit and push EPG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/dishtv.xml epg/dishtv.xml.gz
          git commit -m "Update DishTV EPG ($(TZ='Asia/Kolkata' date +"%Y-%m-%d %H:%M:%S %Z"))" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dishtv-epg
          path: epg/dishtv.xml
          if-no-files-found: ignore

