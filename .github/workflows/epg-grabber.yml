name: EPG Downloader & Grabber

on:
  schedule:
    - cron: '45 21 * * *' # 21:45 UTC / 03:15 IST
  workflow_dispatch:

jobs:
  epg:
    name: EPG Grab & Download
    runs-on: ubuntu-latest
    steps:
      # -----------------------------
      # Step 1: Checkout repository
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Step 2: Set up Git identity
      # -----------------------------
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

      # -----------------------------
      # Step 3: Clone EPG repo
      # -----------------------------
      - name: Clone iptv-org EPG repo
        run: git clone --depth 1 -b master https://github.com/iptv-org/epg.git epg-org

      # -----------------------------
      # Step 4: Setup Node.js
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: epg-org/package-lock.json

      - name: Install Node.js dependencies
        run: cd epg-org && npm install --no-audit --no-fund --legacy-peer-deps

      # -----------------------------
      # Step 5: Run Node.js EPG grabbers
      # -----------------------------
      - name: Grab DishTV EPG
        run: |
          cd epg-org
          npm run grab -- --channels=../sites/dishtv.xml --maxConnections=10 --days=4 --gzip
          mkdir -p ../epg
          cp guide.xml ../epg/dishtv.xml
          cp guide.xml.gz ../epg/dishtv.xml.gz
          cd ..
          python3 scripts/dishtv_epg.py

      - name: Upload DishTV EPG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dishtv-epg
          path: epg/dishtv.xml
          if-no-files-found: ignore

      - name: Grab TataPlay EPG
        run: |
          cd epg-org
          npm run grab -- --channels=../sites/tataplay.xml --maxConnections=10 --days=4 --gzip
          mkdir -p ../epg
          cp guide.xml ../epg/tataplay.xml
          cp guide.xml.gz ../epg/tataplay.xml.gz
          cd ..
          python3 scripts/tataplay_epg.py

      - name: Upload TataPlay EPG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tataplay-epg
          path: epg/tataplay.xml
          if-no-files-found: ignore

      - name: Grab senvora EPG
        run: |
          cd epg-org
          npm run grab -- --channels=../sites/senvora.xml --maxConnections=10 --days=4 --gzip
          mkdir -p ../epg
          cp guide.xml ../epg/senvora.xml
          cp guide.xml.gz ../epg/senvora.xml.gz
          cd ..
          python3 scripts/senvora_epg.py

      - name: Upload senvora EPG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: senvora-epg
          path: epg/senvora.xml
          if-no-files-found: ignore

      # -----------------------------
      # Step 6: Setup Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      # -----------------------------
      # Step 7: Run Python EPG Downloader
      # -----------------------------
      - name: Run XML Organizer Script
        run: python scripts/epg-downloader.py

      # -----------------------------
      # Step 8: Get current IST date
      # -----------------------------
      - name: Get current date in IST
        id: get_date
        env:
          TZ: Asia/Kolkata
        run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      # -----------------------------
      # Step 9: Commit and push all EPG files
      # -----------------------------
      - name: Commit & push updated EPG files
        run: |
          git add epg/*.xml.gz
          git commit -m "EPG updated at ${{ env.current_date }} (IST)" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push