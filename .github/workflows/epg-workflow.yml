name: Unified EPG Workflow

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: epg-jobs
  cancel-in-progress: true

jobs:
  ###############################
  # EPG Grabber Job (Guide only)
  ###############################
  epg-grabber:
    name: EPG Grabber (Guide)
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

      - name: Cache Node.js
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node.js dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Create Guide folder
        run: mkdir -p guide

      - name: Grab EPG (Guide only)
        run: |
          set -e
          PROVIDER=guide
          CHANNELS=sites/guide.xml
          OUTFILE=guide/guide.xml

          echo "::group::EPG Grab - $PROVIDER"
          echo "[$PROVIDER] Grabbing EPG..."
          if npm run grab -- --channels="$CHANNELS" --maxConnections=10 --days=2 --output="$OUTFILE"; then
            echo "[$PROVIDER] Grab successful: $OUTFILE"
          else
            echo "[$PROVIDER] Grab failed, trying fallback copy..."
            [ -f "$CHANNELS" ] && cp "$CHANNELS" "$OUTFILE" || echo "[$PROVIDER] No file to copy"
          fi

          if [ -f scripts/personal/epg-grabber.py ]; then
            echo "::group::Cleaning EPG"
            python3 scripts/personal/epg-grabber.py "$OUTFILE" || echo "[$PROVIDER] Cleaning failed"
            echo "::endgroup::"
          fi

          echo "::endgroup::"
          echo "==== Finished grabber for $PROVIDER ===="

      - name: Commit & push EPG files
        run: |
          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git add guide/*.xml.gz || true
          git diff --cached --quiet || git commit -m "epg (guide) updated at $(date +'%Y-%m-%d %H:%M:%S') IST"
          git pull --rebase --autostash origin "$DEFAULT_BRANCH" || true
          git push origin "$DEFAULT_BRANCH"

      - name: Upload EPG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epg-files
          path: guide/*.xml.gz
