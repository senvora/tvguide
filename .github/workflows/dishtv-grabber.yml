name: Dish TV Grabber

on:
  schedule:
    - cron: "30 20 * * *" # Daily at 02:00 IST
  workflow_dispatch:       # Allow manual trigger

jobs:
  grab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clone EPG repo
        run: |
          git clone --depth 1 -b master https://github.com/iptv-org/epg.git epg-org

      - name: Install dependencies
        run: |
          cd epg-org
          npm install

      - name: Run grabber with custom channels
        run: |
          cd epg-org
          npm run grab -- --channels=../sites/dishtv.xml --maxConnections=10 --days=3 --gzip
          mkdir -p ../epg
          cp guide.xml ../epg/dishtv.xml
          cp guide.xml.gz ../epg/dishtv.xml.gz

      - name: Clean EPG file
        run: python3 scripts/dishtv_epg.py

      - name: Commit and push EPG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/dishtv.xml epg/dishtv.xml.gz
          git commit -m "Update EPG ($(date -u +"%Y-%m-%d %H:%M:%S"))" || echo "No changes to commit"
          git push
