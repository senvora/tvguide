name: Test Grabber

on:
  workflow_dispatch:

jobs:
  grabber:
    name: EPG Grabber
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Git identity
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

      # Step 3: Clone EPG repo
      - name: Clone iptv-org EPG repo
        run: git clone --depth 1 -b master https://github.com/iptv-org/epg.git epg-org

      # Step 4: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: epg-org/package-lock.json

      - name: Install Node.js dependencies
        run: cd epg-org && npm install --no-audit --no-fund --legacy-peer-deps

      # Step 5: Run Node.js EPG grabbers
      - name: Grab DistroTV EPG
        run: |
          cd epg-org
          TZ=Asia/Kolkata npm run grab -- --channels=../sites/distrotv.xml --maxConnections=10 --days=3 --gzip
          mkdir -p ../epg
          cp guide.xml ../epg/distro.xml
          cp guide.xml.gz ../epg/distro.xml.gz
          cd ..
          export TZ=Asia/Kolkata
          python3 scripts/dishtv_epg.py

      # Save epg/ folder for the next job
      - name: Upload EPG folder
        uses: actions/upload-artifact@v4
        with:
          name: epg-files
          path: epg/
          
      # Step 6: Get current IST date
      - name: Get current date in IST
        id: get_date
        env:
          TZ: Asia/Kolkata
        run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      # Step 7: Commit & push all updated EPG files (one commit only)
      - name: Commit & push updated EPG files
        run: |
          git add epg/*.xml.gz || true
          git commit -m "EPG updated at ${{ env.current_date }} (IST)" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
