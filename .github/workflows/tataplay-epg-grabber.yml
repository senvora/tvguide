name: TataPlay EPG Grabber

on:
  schedule:
    - cron: '45 22 * * *' # Runs at 4:15 AM IST
  workflow_dispatch: # Manual trigger

jobs:
  grab-epg:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: xml, imagick, zip, curl

    # Step 3: Run Tempest script
    - name: Run Tempest script
      run: php epg-grabber/tempest.php --epg config=tataplay.config.xml

    # Step 4: Save Tempest EPG
    - name: Save Tempest EPG
      run: |
        if [ -f epg-grabber/epg/tataplay.xml ]; then
          mkdir -p epg
          cp epg-grabber/epg/tataplay.xml epg/tataplay.xml
        fi

    # Step 5: Run TataPlay EPG Python generator
    - name: Run TataPlay EPG Python script
      run: python3 scripts/tataplay-epg.py

    # Step 6: Get current date in IST
    - name: Get current date in IST
      id: get_date
      env:
        TZ: Asia/Kolkata
      run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    # Step 7: Commit and push updated files
    - name: Commit and push updated files
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "EPG grabbed at ${{ env.current_date }} (IST)"
        file_pattern: epg/*
